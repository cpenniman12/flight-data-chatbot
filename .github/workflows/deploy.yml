name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Build
        run: |
          cd frontend
          npm run build
          
      - name: Deploy built files to root
        run: |
          # Copy built files to root directory
          cp -r frontend/dist/* .
          
          # Add built files to git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git add assets/
          git add vite.svg || true
          
          # Commit and push if there are changes
          git diff --staged --quiet || (git commit -m "Deploy built frontend to root [skip ci]" && git push)

